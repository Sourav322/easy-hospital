<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laboratory – Easy Hospital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon"><i data-lucide="activity"></i></div>
        <div class="logo-text"><span class="logo-main">Easy</span><span class="logo-sub">Hospital</span></div>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()"><i data-lucide="x"></i></button>
    </div>
    <div id="sidebar-nav"></div>
  </aside>
  <div class="main-content">
    <div id="topbar-container"></div>
    <div class="page-content">

      <div class="stats-grid">
        <div class="stat-card purple"><div class="stat-icon"><i data-lucide="flask-conical"></i></div><div class="stat-info"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Orders Today</div></div></div>
        <div class="stat-card yellow"><div class="stat-icon"><i data-lucide="clock"></i></div><div class="stat-info"><div class="stat-value" id="stat-pending">—</div><div class="stat-label">Pending</div></div></div>
        <div class="stat-card blue"><div class="stat-icon"><i data-lucide="loader"></i></div><div class="stat-info"><div class="stat-value" id="stat-processing">—</div><div class="stat-label">Processing</div></div></div>
        <div class="stat-card green"><div class="stat-icon"><i data-lucide="check-circle"></i></div><div class="stat-info"><div class="stat-value" id="stat-completed">—</div><div class="stat-label">Completed</div></div></div>
      </div>

      <div class="card" style="margin-bottom:1.5rem;">
        <div class="flex-between flex-wrap gap-3">
          <div class="search-box">
            <i data-lucide="search"></i>
            <input type="text" id="search-input" placeholder="Search patient or order…" oninput="debounce(loadOrders,300)()"/>
          </div>
          <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
            <input type="date" id="filter-date" class="form-input" style="width:160px;" onchange="loadOrders()"/>
            <select id="filter-status" class="form-select" style="width:150px;" onchange="loadOrders()">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="processing">Processing</option>
              <option value="completed">Completed</option>
            </select>
            <button class="btn-primary" onclick="openNewOrderModal()"><i data-lucide="plus"></i> New Lab Order</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead><tr><th>Order ID</th><th>Patient</th><th>Tests</th><th>Doctor</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="orders-tbody"><tr><td colspan="7" class="text-center"><div class="loading-spinner"></div></td></tr></tbody>
          </table>
        </div>
        <div id="pagination-container" class="pagination" style="margin-top:1rem;"></div>
      </div>
    </div>
  </div>
</div>

<!-- New Lab Order Modal -->
<div class="modal-overlay" id="order-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>New Lab Order</h3>
      <button class="btn-icon" onclick="closeModal('order-modal')"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid" style="margin-bottom:1rem;">
        <div class="form-group" style="position:relative;">
          <label class="form-label">Patient *</label>
          <input type="text" id="order-patient-search" class="form-input" placeholder="Search patient…" oninput="debounce(searchOrderPatient,300)()"/>
          <div id="order-patient-suggestions" class="suggestions-box" style="display:none;"></div>
          <input type="hidden" id="order-patient-id"/>
        </div>
        <div class="form-group">
          <label class="form-label">Referring Doctor</label>
          <select id="order-doctor" class="form-select"><option value="">Select Doctor</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="order-priority" class="form-select">
            <option value="routine">Routine</option><option value="urgent">Urgent</option><option value="stat">STAT (Emergency)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input type="text" id="order-notes" class="form-input" placeholder="Optional clinical notes…"/>
        </div>
      </div>

      <h4 style="font-weight:700;margin-bottom:.75rem;">Select Tests</h4>
      <div id="tests-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.625rem;max-height:280px;overflow-y:auto;padding:1px;"></div>

      <div id="selected-tests-summary" style="margin-top:1rem;padding:.75rem;background:var(--primary-light);border-radius:.5rem;display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span id="selected-count" style="font-weight:600;color:var(--primary);">0 tests selected</span>
          <span id="selected-total" style="font-weight:700;color:var(--primary);"></span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('order-modal')">Cancel</button>
      <button class="btn-primary" onclick="createOrder()"><i data-lucide="flask-conical"></i> Create Order</button>
    </div>
  </div>
</div>

<!-- Update Results Modal -->
<div class="modal-overlay" id="results-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>Update Lab Results</h3>
      <button class="btn-icon" onclick="closeModal('results-modal')"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="result-order-id"/>
      <div id="results-items-container"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('results-modal')">Cancel</button>
      <button class="btn-primary" onclick="saveResults()"><i data-lucide="save"></i> Save Results</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  requireAuth(); renderSidebar('laboratory'); renderTopbar('Laboratory','Manage lab orders and results'); lucide.createIcons();

  let currentPage=1; const PER_PAGE=10;
  let allTests=[], selectedTestIds=new Set();

  document.getElementById('filter-date').value = new Date().toISOString().split('T')[0];

  async function init() {
    const [testsRes, docRes] = await Promise.all([api.get('/api/lab/tests'), api.get('/api/doctors?limit=100')]);
    allTests = testsRes.tests||[];
    const docs = docRes.doctors||[];
    document.getElementById('order-doctor').innerHTML += docs.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
    renderTestsGrid();
    loadOrders();
  }

  function renderTestsGrid() {
    document.getElementById('tests-grid').innerHTML = allTests.map(t=>`
      <label class="test-check-item" id="test-label-${t.id}" style="display:flex;align-items:center;gap:.625rem;padding:.625rem .75rem;border:1px solid var(--border);border-radius:.5rem;cursor:pointer;transition:.15s;">
        <input type="checkbox" value="${t.id}" onchange="toggleTest(${t.id},${t.price||0},'${t.name}')"/>
        <div style="flex:1;"><div style="font-size:.875rem;font-weight:600;">${t.name}</div>
        <div style="font-size:.75rem;color:var(--text-muted);">₹${Number(t.price||0).toLocaleString()}</div></div>
      </label>`).join('');
  }

  function toggleTest(id, price, name) {
    const lbl = document.getElementById(`test-label-${id}`);
    if(selectedTestIds.has(id)) { selectedTestIds.delete(id); lbl.style.borderColor='var(--border)'; lbl.style.background=''; }
    else { selectedTestIds.add(id); lbl.style.borderColor='var(--primary)'; lbl.style.background='var(--primary-light)'; }
    updateTestSummary();
  }

  function updateTestSummary() {
    const count=selectedTestIds.size;
    const total = [...selectedTestIds].reduce((s,id)=>{ const t=allTests.find(x=>x.id==id); return s+(t?Number(t.price||0):0); },0);
    const el=document.getElementById('selected-tests-summary');
    el.style.display=count?'block':'none';
    document.getElementById('selected-count').textContent=count+' test'+(count!==1?'s':'')+' selected';
    document.getElementById('selected-total').textContent='Total: ₹'+total.toLocaleString();
  }

  async function loadOrders() {
    const search=document.getElementById('search-input').value;
    const date=document.getElementById('filter-date').value;
    const status=document.getElementById('filter-status').value;
    let url=`/api/lab/orders?page=${currentPage}&limit=${PER_PAGE}`;
    if(search) url+=`&search=${encodeURIComponent(search)}`;
    if(date) url+=`&date=${date}`;
    if(status) url+=`&status=${status}`;
    const res=await api.get(url);
    const orders=res.orders||[];
    const total=res.total||0;

    document.getElementById('stat-total').textContent=total;
    document.getElementById('stat-pending').textContent=orders.filter(o=>o.status==='pending').length;
    document.getElementById('stat-processing').textContent=orders.filter(o=>o.status==='processing').length;
    document.getElementById('stat-completed').textContent=orders.filter(o=>o.status==='completed').length;

    const tbody=document.getElementById('orders-tbody');
    if(!orders.length){tbody.innerHTML=`<tr><td colspan="7"><div class="empty-state"><i data-lucide="flask-conical"></i><p>No lab orders found</p></div></td></tr>`;lucide.createIcons();return;}
    tbody.innerHTML=orders.map(o=>`<tr>
      <td style="font-family:'Space Mono',monospace;font-weight:700;font-size:.8125rem;">LAB-${String(o.id).padStart(5,'0')}</td>
      <td><div style="font-weight:600;">${o.patient_name||'—'}</div><div style="font-size:.75rem;color:var(--text-muted);">${o.uhid||''}</div></td>
      <td><span class="badge-info">${o.test_count||'—'} tests</span></td>
      <td>${o.doctor_name||'—'}</td>
      <td style="font-size:.8125rem;">${o.created_at?new Date(o.created_at).toLocaleDateString():''}</td>
      <td>
        <span class="badge-${o.status==='completed'?'success':o.status==='processing'?'warning':'secondary'}">${formatStatus(o.status)}</span>
        ${o.priority==='urgent'?'<span class="badge-danger" style="margin-left:.25rem;">Urgent</span>':o.priority==='stat'?'<span class="badge-danger" style="margin-left:.25rem;">STAT</span>':''}
      </td>
      <td><div style="display:flex;gap:.5rem;">
        ${o.status!=='completed'?`<button class="btn-icon" title="Enter Results" onclick="openResults(${o.id})"><i data-lucide="edit"></i></button>`:''}
        <button class="btn-icon" title="View" onclick="viewOrder(${o.id})"><i data-lucide="eye"></i></button>
      </div></td>
    </tr>`).join('');
    renderPagination(total,currentPage,PER_PAGE,p=>{currentPage=p;loadOrders();});
    lucide.createIcons();
  }

  async function searchOrderPatient() {
    const q=document.getElementById('order-patient-search').value;
    if(q.length<2){document.getElementById('order-patient-suggestions').style.display='none';return;}
    const res=await api.get(`/api/patients?search=${encodeURIComponent(q)}&limit=5`);
    const pts=res.patients||[];
    const box=document.getElementById('order-patient-suggestions');
    if(!pts.length){box.style.display='none';return;}
    box.innerHTML=pts.map(p=>`<div class="suggestion-item" onclick="selectOrderPatient(${p.id},'${p.name} (${p.uhid})')"><strong>${p.name}</strong> <span style="color:var(--text-muted);">${p.uhid}</span></div>`).join('');
    box.style.display='block';
  }

  function selectOrderPatient(id, label) {
    document.getElementById('order-patient-id').value=id;
    document.getElementById('order-patient-search').value=label;
    document.getElementById('order-patient-suggestions').style.display='none';
  }

  function openNewOrderModal() {
    document.getElementById('order-patient-search').value='';
    document.getElementById('order-patient-id').value='';
    document.getElementById('order-notes').value='';
    document.getElementById('order-priority').value='routine';
    selectedTestIds.clear();
    renderTestsGrid();
    updateTestSummary();
    openModal('order-modal'); lucide.createIcons();
  }

  async function createOrder() {
    const patientId=document.getElementById('order-patient-id').value;
    if(!patientId){showToast('Please select a patient.','error');return;}
    if(!selectedTestIds.size){showToast('Please select at least one test.','error');return;}
    const payload={
      patient_id:patientId,
      doctor_id:document.getElementById('order-doctor').value||null,
      priority:document.getElementById('order-priority').value,
      notes:document.getElementById('order-notes').value.trim(),
      test_ids:[...selectedTestIds],
    };
    try{await api.post('/api/lab/orders',payload);showToast('Lab order created!','success');closeModal('order-modal');loadOrders();}
    catch(e){showToast(e.message||'Error creating order','error');}
  }

  async function openResults(orderId) {
    const res=await api.get(`/api/lab/orders/${orderId}/items`);
    const items=res.items||[];
    document.getElementById('result-order-id').value=orderId;
    document.getElementById('results-items-container').innerHTML = items.map(item=>`
      <div style="padding:1rem;border:1px solid var(--border);border-radius:.5rem;margin-bottom:.75rem;">
        <div style="font-weight:600;margin-bottom:.75rem;">${item.test_name}</div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Result</label><input type="text" class="form-input" id="res-val-${item.id}" value="${item.result_value||''}" placeholder="Result value"/></div>
          <div class="form-group"><label class="form-label">Normal Range</label><input type="text" class="form-input" id="res-range-${item.id}" value="${item.normal_range||item.test_normal_range||''}" placeholder="e.g. 70-110"/></div>
          <div class="form-group"><label class="form-label">Unit</label><input type="text" class="form-input" id="res-unit-${item.id}" value="${item.unit||item.test_unit||''}" placeholder="mg/dL"/></div>
          <div class="form-group"><label class="form-label">Status</label>
            <select class="form-select" id="res-status-${item.id}">
              <option value="normal" ${item.result_status==='normal'?'selected':''}>Normal</option>
              <option value="abnormal" ${item.result_status==='abnormal'?'selected':''}>Abnormal</option>
              <option value="critical" ${item.result_status==='critical'?'selected':''}>Critical</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Remarks</label><input type="text" class="form-input" id="res-remarks-${item.id}" value="${item.remarks||''}" placeholder="Optional remarks"/></div>
      </div>`).join('');
    openModal('results-modal'); lucide.createIcons();
  }

  async function saveResults() {
    const orderId=document.getElementById('result-order-id').value;
    const container=document.getElementById('results-items-container');
    const itemEls=container.querySelectorAll('[id^="res-val-"]');
    const results=[];
    itemEls.forEach(el=>{
      const id=el.id.replace('res-val-','');
      results.push({
        item_id:id,
        result_value:document.getElementById(`res-val-${id}`).value.trim(),
        normal_range:document.getElementById(`res-range-${id}`).value.trim(),
        unit:document.getElementById(`res-unit-${id}`).value.trim(),
        result_status:document.getElementById(`res-status-${id}`).value,
        remarks:document.getElementById(`res-remarks-${id}`).value.trim(),
      });
    });
    try{await api.put(`/api/lab/orders/${orderId}/results`,{results,status:'completed'});showToast('Results saved!','success');closeModal('results-modal');loadOrders();}
    catch(e){showToast(e.message||'Error saving results','error');}
  }

  async function viewOrder(id) {
    await openResults(id);
    document.querySelector('#results-modal .modal-header h3').textContent='Lab Results';
    document.querySelector('#results-modal .modal-footer button:last-child').style.display='none';
  }

  function renderPagination(total,page,perPage,cb){
    const pages=Math.ceil(total/perPage),c=document.getElementById('pagination-container');
    if(pages<=1){c.innerHTML='';return;}
    c.innerHTML=`<button class="btn-outline btn-sm" ${page===1?'disabled':''} onclick="(${cb})(${page-1})">←</button>`
      +Array.from({length:pages},(_,i)=>`<button class="btn-${i+1===page?'primary':'outline'} btn-sm" onclick="(${cb})(${i+1})">${i+1}</button>`).join('')
      +`<button class="btn-outline btn-sm" ${page===pages?'disabled':''} onclick="(${cb})(${page+1})">→</button>`;
  }

  init();
</script>
</body>
</html>
